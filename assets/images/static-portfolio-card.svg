<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">

  <!-- Background -->
  <rect width="800" height="420" fill="#0A1628"/>

  <!-- LEFT SIDE — undocumented, no architecture -->
  <rect x="0" y="0" width="370" height="420" fill="#080F1C"/>

  <!-- Messy code without docs -->
  <text x="30" y="48" font-family="'DM Mono', monospace" font-size="10" fill="#B8C0CC" opacity="0.3" letter-spacing="1">NO DOCUMENTATION</text>
  <rect x="20" y="54" width="340" height="1" fill="#B8C0CC" opacity="0.08"/>

  <!-- Code editor — undocumented -->
  <rect x="20" y="62" width="340" height="240" rx="6" fill="#0F2035" stroke="#B8C0CC" stroke-width="0.5" opacity="0.3"/>
  <rect x="20" y="62" width="340" height="20" rx="6" fill="#B8C0CC" opacity="0.06"/>
  <circle cx="36" cy="72" r="3" fill="#B8C0CC" opacity="0.2"/>
  <circle cx="48" cy="72" r="3" fill="#B8C0CC" opacity="0.15"/>
  <circle cx="60" cy="72" r="3" fill="#B8C0CC" opacity="0.1"/>

  <!-- Code lines — no comments, unclear -->
  <text x="30" y="100" font-family="'DM Mono', monospace" font-size="8" fill="#B8C0CC" opacity="0.4">&lt;form action="/submit"&gt;</text>
  <text x="30" y="114" font-family="'DM Mono', monospace" font-size="8" fill="#B8C0CC" opacity="0.35">  &lt;input type="email"/&gt;</text>
  <text x="30" y="128" font-family="'DM Mono', monospace" font-size="8" fill="#B8C0CC" opacity="0.3">  &lt;button&gt;Submit&lt;/button&gt;</text>
  <text x="30" y="142" font-family="'DM Mono', monospace" font-size="8" fill="#B8C0CC" opacity="0.25">&lt;/form&gt;</text>

  <!-- Question marks floating -->
  <text x="280" y="108" font-family="'DM Mono', monospace" font-size="22" fill="#B8C0CC" opacity="0.12">?</text>
  <text x="300" y="140" font-family="'DM Mono', monospace" font-size="16" fill="#B8C0CC" opacity="0.1">?</text>
  <text x="260" y="150" font-family="'DM Mono', monospace" font-size="12" fill="#B8C0CC" opacity="0.08">?</text>

  <!-- Warning labels floating -->
  <rect x="30" y="162" width="220" height="16" rx="3" fill="#1A0808" stroke="#8B4513" stroke-width="0.5" opacity="0.6"/>
  <text x="36" y="174" font-family="'DM Mono', monospace" font-size="7" fill="#FFB347" opacity="0.6">Where does form data go?</text>

  <rect x="30" y="184" width="200" height="16" rx="3" fill="#1A0808" stroke="#8B4513" stroke-width="0.5" opacity="0.5"/>
  <text x="36" y="196" font-family="'DM Mono', monospace" font-size="7" fill="#FFB347" opacity="0.5">Is user input validated?</text>

  <rect x="30" y="206" width="240" height="16" rx="3" fill="#1A0808" stroke="#8B4513" stroke-width="0.5" opacity="0.45"/>
  <text x="36" y="218" font-family="'DM Mono', monospace" font-size="7" fill="#FFB347" opacity="0.45">No backend — does submit even work?</text>

  <rect x="30" y="228" width="210" height="16" rx="3" fill="#1A0808" stroke="#8B4513" stroke-width="0.5" opacity="0.4"/>
  <text x="36" y="240" font-family="'DM Mono', monospace" font-size="7" fill="#FFB347" opacity="0.4">CSRF protection missing?</text>

  <rect x="30" y="250" width="190" height="16" rx="3" fill="#1A0808" stroke="#8B4513" stroke-width="0.5" opacity="0.35"/>
  <text x="36" y="262" font-family="'DM Mono', monospace" font-size="7" fill="#FFB347" opacity="0.35">No GDPR documentation</text>

  <!-- No README notice -->
  <rect x="20" y="318" width="340" height="50" rx="6" fill="#0A0A0A" stroke="#B8C0CC" stroke-width="0.3" stroke-dasharray="4 3" opacity="0.3"/>
  <text x="190" y="340" font-family="'DM Mono', monospace" font-size="10" fill="#B8C0CC" text-anchor="middle" opacity="0.2">README.md</text>
  <text x="190" y="358" font-family="'DM Mono', monospace" font-size="8" fill="#B8C0CC" text-anchor="middle" opacity="0.15">not found</text>

